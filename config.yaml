paths:
  pdb: 1aki/1AKI.pdb
  output_root: data
  run_id: production
  topology: topology.pdb
  minimized: minimized.pdb
  trajectory: traj.dcd
  log: md_log.txt
  checkpoint: checkpoint.chk

force_fields:
  - amber19/protein.ff19SB.xml
  - amber19/tip3pfb.xml

thermodynamics:
  temperature: 300
  pressure: 1
  friction_coefficient: 1.0
  step_size: 0.004  # ps; 4 fs with HMR

system:
  nonbonded_cutoff: 1.0
  solvent_padding: 1.5
  ionic_strength: 0.15
  hydrogen_mass: 4.0

simulation:
  nvt_steps: 2500
  npt_steps: 2500
  production_steps: 2500

reporting:
  dcd_interval: 25
  stdout_interval: 25
  log_interval: 25

restraints:
  force_constant: 1000.0
  selection: "backbone"
